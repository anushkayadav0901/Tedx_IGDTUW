<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="TEDxIGDTU - Beyond Barriers: Who Shapes the Future?" />
    
    <!-- Preconnect to font providers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Load only essential font weights -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <title>TEDxIGDTU - Beyond Barriers</title>
    
    <!-- Inline critical CSS for instant white loader -->
    <style>
      /* Ensure fabric curtain appears instantly before React loads */
      #curtain-loader-initial {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        pointer-events: none;
        background-color: #000000;
      }
      
      #curtain-loader-initial .left-panel {
        position: absolute;
        top: 0;
        left: 0;
        width: 50%;
        height: 100%;
        background: 
          linear-gradient(to bottom, #f5f5f5 0%, #ffffff 50%, #f5f5f5 100%),
          repeating-linear-gradient(
            90deg,
            #fafafa 0px,
            #ffffff 8px,
            #f8f8f8 16px,
            #fefefe 24px,
            #f9f9f9 32px,
            #ffffff 40px,
            #fafafa 48px,
            #f7f7f7 56px,
            #ffffff 64px
          );
        background-blend-mode: multiply;
        box-shadow: 
          inset -15px 0 30px -10px rgba(0,0,0,0.15),
          5px 0 20px rgba(0,0,0,0.1);
        clip-path: polygon(0 0, 100% 0, 99% 100%, 0 100%);
      }
      
      #curtain-loader-initial .right-panel {
        position: absolute;
        top: 0;
        right: 0;
        width: 50%;
        height: 100%;
        background: 
          linear-gradient(to bottom, #f5f5f5 0%, #ffffff 50%, #f5f5f5 100%),
          repeating-linear-gradient(
            90deg,
            #fafafa 0px,
            #ffffff 8px,
            #f8f8f8 16px,
            #fefefe 24px,
            #f9f9f9 32px,
            #ffffff 40px,
            #fafafa 48px,
            #f7f7f7 56px,
            #ffffff 64px
          );
        background-blend-mode: multiply;
        box-shadow: 
          inset 15px 0 30px -10px rgba(0,0,0,0.15),
          -5px 0 20px rgba(0,0,0,0.1);
        clip-path: polygon(1% 0, 100% 0, 100% 100%, 0 100%);
      }
      
      #curtain-loader-initial .center-line {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 100%;
        background: linear-gradient(to bottom, transparent 0%, #ff0000 10%, #ff0000 90%, transparent 100%);
        box-shadow: 0 0 10px rgba(255, 0, 0, 0.45);
        z-index: 1;
      }
      
      /* Hide once React takes over */
      .curtain-loader-hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- Static loader that appears instantly -->
    <div id="curtain-loader-initial">
      <div class="left-panel"></div>
      <div class="right-panel"></div>
      <div class="center-line"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- Hide static loader once React mounts -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var staticLoader = document.getElementById('curtain-loader-initial');
          if (staticLoader) {
            staticLoader.classList.add('curtain-loader-hidden');
          }
        }, 100);
      });
    </script>
  </body>
</html>
